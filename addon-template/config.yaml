name: "Template Add-on"
version: "1.0.0"
slug: "addon_template"
description: "Starter template for converting self-hosted services into Home Assistant Add-ons."
url: "https://github.com/MnApps/HomeAssistanceAddons"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
boot: "auto"
ports:
  8080/tcp: 8080
host_network: false
ingress: true
ingress_port: 8080
options:
  log_level: "info"
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
